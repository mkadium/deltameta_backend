name: CI

on:
  push:
    branches: [ main, dev, staging ]
  pull_request:
    branches: [ main, dev, staging ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install backend deps
        run: |
          if [ -f backend/requirements.txt ]; then python -m pip install --upgrade pip && pip install -r backend/requirements.txt; else echo "No backend requirements"; fi
      - name: Run Python tests
        run: |
          if [ -d backend/testcases ]; then pip install pytest && pytest -q backend/testcases; else echo "No backend tests"; fi
      - name: Build and push Docker image (optional)
        if: github.event_name == 'push'
        env:
          REGISTRY: ghcr.io
          IMAGE_NAME: ${{ github.repository }}
        run: |
          if [ -f Dockerfile ]; then echo "Building image..."; docker build -t "${REGISTRY}/${IMAGE_NAME}:latest" .; else echo "No Dockerfile"; fi

